<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1420" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="VoltES — orçamentos elétricos residenciais e comerciais para o Espírito Santo." />
  <meta name="application-name" content="VoltES" />
  <meta name="voltes-version" content="1.4.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="VoltES" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>VoltES — Orçamentos Elétricos</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="./assets/icons/icon-192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/styles.css" />

  <script src="https://unpkg.com/lucide@0.468.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js" defer></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none"><path d="M18 2L8 18h7l-1 12 12-18h-7l-1-10z" fill="currentColor"/></svg>
        </div>
        <div>
          <strong>VoltES</strong>
          <span>Espírito Santo</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-view="clientes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Clientes
        </button>
        <button class="nav-item" data-view="orcamentos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
          Orçamentos
        </button>
        <button class="nav-item" data-view="servicos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
          Serviços
        </button>
        <button class="nav-item" data-view="produtos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.3 7L12 12l8.7-5M12 22V12"/></svg>
          Materiais
        </button>
        <button class="nav-item" data-view="financeiro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Financeiro
        </button>
        <button class="nav-item" data-view="calculadoras">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h8M8 14h3M13 14h3M8 18h3M13 18h3"/></svg>
          Calculadoras
        </button>
        <button class="nav-item" data-view="contratos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Contratos
        </button>
        <button class="nav-item" data-view="empresa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4M9 9v.01M9 12v.01M9 15v.01M9 18v.01"/></svg>
          Empresa
        </button>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-sm install-pwa" id="installPwaBtn" type="button" hidden>
          Instalar app
        </button>
        <div class="sync-chip" id="syncChip" title="Status da nuvem Firebase">
          <span class="dot"></span>
          <span id="syncLabel">Sincronizando…</span>
        </div>
        <div class="region-chip">
          <span class="dot"></span>
          Preços ES · mercado 2026
        </div>
        <div class="app-version" id="appVersion" title="Versão do app / cache">v1.4.0</div>
      </div>
    </aside>

    <div class="main-wrap">
      <header class="topbar">
        <button class="icon-btn mobile-toggle" id="menuToggle" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="topbar-title">
          <h1 id="pageTitle">Dashboard</h1>
          <p id="pageSubtitle">Visão geral do seu negócio elétrico</p>
        </div>
        <div class="topbar-actions">
          <div class="price-mode" title="Valor usado nos orçamentos e catálogos">
            <span class="price-mode-label">Preço</span>
            <div class="segmented" id="precoModoSeg">
              <button type="button" data-modo="minimo">Mínimo</button>
              <button type="button" data-modo="medio" class="active">Médio</button>
              <button type="button" data-modo="maximo">Máximo</button>
            </div>
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input type="search" id="globalSearch" placeholder="Buscar..." />
          </div>
          <button class="btn btn-primary" id="quickOrcamento">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            Novo orçamento
          </button>
        </div>
      </header>

      <main class="content" id="content"></main>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modalTitle">Modal</h2>
        <button class="icon-btn" id="modalClose" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="./src/version.js"></script>
  <script src="./src/data.js"></script>
  <script src="./src/firebase.js"></script>
  <script src="./src/cache.js"></script>
  <script src="./src/store.js"></script>
  <script src="./src/pdf.js"></script>
  <script src="./src/pwa.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
